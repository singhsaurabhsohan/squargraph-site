<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="/fonts/fonts.css" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 - Not Found | SQUARGRAPH™</title>

  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    :root {
      --bg: #03020A;
      --text: #EEEEF5;
      --muted: rgba(238, 238, 245, 0.6);
      --accent: #A855F7;
      --accent-border: rgba(168, 85, 247, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background: var(--bg);
      color: var(--text);
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .error-code {
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.06em;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .error-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 500;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }

    .error-text {
      max-width: 520px;
      font-size: 16px;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--accent-border);
      padding-bottom: 4px;
      transition: border-color .2s ease,
                  color .2s ease;
    }

    .home-link:hover {
      color: #ffffff;
      border-color: #ffffff;
    }

    .brand {
      position: fixed;
      top: 32px;
      left: 32px;
    }

    .brand img {
      height: 28px;
      width: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .brand {
        top: 24px;
        left: 24px;
      }
    }
  </style>
  <link rel="stylesheet" href="/assets/css/site-refresh.css?v=20260708-consistency" />
</head>

<body>

  <a href="/" class="brand" aria-label="SQUARGRAPH™">
    <img
      src="/logo.webp"
      alt="SQUARGRAPH™"
      width="120"
      height="28"
      decoding="async"
    />
  </a>

  <div class="error-code">404</div>

  <h1 class="error-title">
    Page Not Found
  </h1>

  <p class="error-text">
    The page you're looking for doesn't exist, has been moved,
    or is no longer available.
  </p>

  <a href="/" class="home-link">
    ← Back to SQUARGRAPH
  </a>

</body>
</html>
