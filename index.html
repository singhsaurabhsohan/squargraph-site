<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SQUARGRAPH Studios — Saurabh Sohan Singh</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>

/* 🔧 FIX 1: REMOVE SCROLL CONFLICT */
html {
  scroll-behavior: auto;
}

body{
  background:#0f0f0f;
  color:#fff;
  font-family:'DM Sans';
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 60px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:flex-end;
  padding:60px;
}

/* 🔧 FIX 2: VIDEO PROPERLY VISIBLE */
.project-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.4s;
}

/* CARD */
.project-card{
  position:relative;
  height:320px;
  background:#1a1a1a;
  overflow:hidden;
}

.project-card:hover .project-video{
  opacity:1;
}

.project-info{
  position:absolute;
  bottom:20px;
  left:20px;
}

/* SECTION */
section{
  padding:120px 60px;
}

/* BUTTON */
.btn{
  padding:14px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}
.btn:hover{
  background:#fff;
  color:#000;
}

</style>
</head>

<body>

<nav>
  SQUARGRAPH
</nav>

<section id="hero">
  <h1>Clarity.<br>Ideas.<br>Execution.</h1>
</section>

<section>

<div class="project-card">

<video class="project-video" muted loop>
<source src="hyundai.mp4">
</video>

<div class="project-info">
Hyundai Campaign
</div>

</div>

</section>

<script>

/* 🔧 FIX 3: VIDEO HOVER */
document.querySelectorAll('.project-card').forEach(card=>{
  const video=card.querySelector('video');
  if(!video) return;

  card.addEventListener('mouseenter',()=>video.play());
  card.addEventListener('mouseleave',()=>{
    video.pause();
    video.currentTime=0;
  });
});

/* 🔧 FIX 4: GSAP SAFE */
gsap.registerPlugin(ScrollTrigger);

gsap.from("h1",{
  y:100,
  opacity:0,
  duration:1.2
});

</script>

</body>
</html>
