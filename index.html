  <style>
    /* ─── CSS Variables ─── */
    :root {
      --offwhite: #FAFAF9;
      --warmgray: #F5F5F3;
      --coolgray: #F0EFED;
      --bordergray: #E5E3DF;
      --textmuted: #2A2623;
      --textsecondary: #3D3935;
      --textprimary: #1A1714;
      --accent: #6B5DB8;
      --accentmuted: #7B6FB8;
      --accentlight: #EEECf7;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; overflow-x: hidden; font-weight: 400; }

    body {
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--textprimary);
      background: #FFFFFF;
      line-height: 1.5;
      letter-spacing: -0.01em;
      overflow-x: hidden;
      font-weight: 400;
    }

    ::selection { background: rgba(139,126,200,.18); color: var(--textprimary); }
    * { -webkit-tap-highlight-color: transparent; }

    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: #fff; }
    ::-webkit-scrollbar-thumb { background: var(--bordergray); }

    /* ─── Skip link ─── */
    .skip-link {
      position: absolute; top: -100px; left: 16px;
      background: var(--accent); color: #fff;
      padding: 10px 20px; border-radius: 4px;
      font-size: 14px; font-weight: 500; z-index: 9999;
      transition: top .2s;
    }
    .skip-link:focus { top: 16px; }

    /* ══════════════════════════
       NAVIGATION
    ══════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 103;
      transition: background .4s, border-color .4s, backdrop-filter .4s;
    }
    nav.scrolled {
      background: rgba(250,250,249,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--bordergray);
    }
    .nav-inner {
      max-width: 1440px; margin: 0 auto;
      padding: 0 clamp(24px, 4vw, 64px);
      display: flex; align-items: center; justify-content: space-between;
      height: 84px;
    }
    .nav-logo {
      display:flex;
      align-items:center;
      line-height:1;
      font-size: 19px; font-weight: 600;
      letter-spacing: -0.03em; color: var(--textprimary);
    }
    .nav-logo sup {
      font-size: 9px; color: var(--accent);
      vertical-align: super; margin-left: 1px;
    }
    .nav-links {
      display: flex; align-items: center; gap: 40px;
    }
    .nav-links a {
      font-size: 13px; font-weight: 500;
      color: var(--textsecondary);
      transition: color .25s;
      letter-spacing: -0.01em;
    }
    .nav-links a:hover { color: var(--textprimary); }
    .nav-links a.active { color: var(--textprimary); border-bottom: 1px solid var(--accent); padding-bottom: 2px; }
    .nav-cta {
      font-size: 13px; font-weight: 500;
      color: var(--textprimary);
      border: 1px solid var(--bordergray);
      border-radius: 999px;
      padding: 10px 24px;
      transition: background .25s, color .25s, border-color .25s;
    }
    .nav-cta:hover {
      background: var(--textprimary);
      color: #fff;
      border-color: var(--textprimary);
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-cta {
        display: none;
      }
    }
    @media (min-width: 480px) and (max-width: 768px) {
      .nav-cta {
        display: inline-flex;
        font-size: 12px;
        padding: 9px 16px;
        margin-right: 8px;
      }
    }
    @media (max-width: 768px) {
      .hero-ctas { padding-bottom: 80px; }
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer;
      padding: 0;
      position: relative;
      z-index: 102;
    }
    .pill-menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .pill-line {
      width: 28px;
      height: 1.5px;
      background: var(--textprimary);
      border-radius: 999px;
      transition: transform .35s cubic-bezier(.77,0,.18,1), opacity .3s;
    }
    .pill-body {
      width: 28px;
      height: 13px;
      border: 1.5px solid var(--textprimary);
      border-radius: 999px;
      background: transparent;
      transition: transform .35s cubic-bezier(.77,0,.18,1), opacity .3s;
    }
    .hamburger.open .pill-line {
      transform: translateY(9px) rotate(45deg);
    }
    .hamburger.open .pill-body {
      opacity: 0;
      transform: scaleX(0);
    }
    @media (max-width: 768px) { .hamburger { display: flex; } }
    @media (min-width: 769px) { .hamburger { display: none !important; } }

    /* Mobile menu */
    #mob-menu {
      display: flex; position: fixed; inset: 0; z-index: 101;
      background: #fff;
      flex-direction: column; justify-content: center;
      padding: clamp(32px, 8vw, 64px);
      padding-top: 100px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    #mob-menu.open { opacity: 1; pointer-events: all; }
    #mob-menu a:not(.mob-contact) {
      display: block;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--textprimary);
      padding: 16px 0;
      border-bottom: 1px solid var(--bordergray);
      transition: color .2s;
    }
    #mob-menu a:hover { color: var(--accent); }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:visible;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    #mob-menu .mob-contact {
      margin-top: 32px;
      font-size: 13px;
      color: var(--textmuted);
      border-bottom: none;
      display: block;
    }
    /* ══════════════════════════
       ANIMATIONS
    ══════════════════════════ */
    .fade-up {
      opacity: 0; transform: translateY(32px);
      transition: opacity .9s cubic-bezier(.25,.1,.25,1), transform .9s cubic-bezier(.25,.1,.25,1);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    .fade-up.d1 { transition-delay: .1s; }
    .fade-up.d2 { transition-delay: .2s; }
    .fade-up.d3 { transition-delay: .3s; }
    .fade-up.d4 { transition-delay: .4s; }

    /* Hero entrance */
    @keyframes heroFade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-anim-1 { animation: heroFade .8s .2s both; }
    .hero-anim-2 { animation: heroFade .9s .35s both; }
    .hero-anim-3 { animation: heroFade .8s .55s both; }
    .hero-anim-4 { animation: heroFade .8s .7s both; }
    .hero-anim-5 { animation: heroFade 1s 1.2s both; }
    .hero-anim-6 { animation: heroFade 1s 1.6s both; }

    /* Scale reveal */
    @keyframes scaleX {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* ══════════════════════════
       HERO
    ══════════════════════════ */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 80px clamp(24px, 5vw, 80px) 80px;
      position: relative;
    }
    .hero-inner { max-width: 1440px; margin: 0 auto; width: 100%; }
    .hero-content { max-width: 1040px; margin: 0 auto; text-align: left; position: relative; z-index: 1; }
    .hero-eyebrow {
      font-size: 13px; font-weight: 500;
      color: var(--textsecondary);
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: clamp(28px, 4vw, 40px);
      text-align: left;
    }
    .hero-edge-left,
    .hero-edge-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 80px;
      height: 2px;
      background: var(--bordergray);
      opacity: 0.4;
      pointer-events: none;
    }
    /* Abstract floating vector shapes */
.hero-bg-shapes {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
  z-index: 0;
}
.shape {
  position: absolute;
  background: var(--accent);
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.08;
}
.shape-1 {
  width: 40vw;
  height: 40vw;
  top: -20vw;
  right: -10vw;
}
.shape-2 {
  width: 30vw;
  height: 30vw;
  bottom: -15vw;
  left: -15vw;
}
.shape-3 {
  width: 20vw;
  height: 20vw;
  top: 30%;
  left: 20%;
}
@media (max-width: 768px) {
  .shape { filter: blur(40px); opacity: 0.05; }
}
    .hero-edge-left { left: clamp(24px, 4vw, 64px); }
    .hero-edge-right { right: clamp(24px, 4vw, 64px); }
    @media (max-width: 1000px) {
      .hero-edge-left, .hero-edge-right { display: none; }
    }
.hero-h1 {
  font-family: 'Satoshi', sans-serif;
  font-weight: 500;
  font-size: clamp(2.2rem, 5.5vw, 4.8rem);
  line-height: 1.08;
  letter-spacing: -0.04em;
  color: var(--textprimary);
  margin-bottom: clamp(24px, 3vw, 36px);
  contain: layout style;
}
    .hero-h1 em {
      font-style: normal;
      font-weight: 600;
      color: var(--accent);
    }
    .hero-sub {
      font-size: clamp(16px, 1.5vw, 20px);
      color: var(--textsecondary);
      font-weight: 400;
      line-height: 1.65;
      max-width: 52ch;
      margin-bottom: clamp(36px, 5vw, 52px);
      margin-left: 0;
      margin-right: 0;
    }
    .hero-ctas {
      display: flex; flex-wrap: wrap; gap: 14px;
      align-items: center;
      justify-content: flex-start;
      margin-top: 32px;
    }
    .btn-primary {
      display: inline-flex; align-items: center;
      background: var(--textprimary); color: #fff;
      font-size: 14px; font-weight: 500;
      border-radius: 999px;
      padding: 14px 32px;
      letter-spacing: -0.01em;
      transition: background .3s;
    }
    .btn-primary:hover { background: var(--accent); }
    .btn-outline {
      display: inline-flex; align-items: center;
      background: transparent; color: var(--textprimary);
      font-size: 14px; font-weight: 500;
      border: 1px solid var(--bordergray);
      border-radius: 999px;
      padding: 13px 28px;
      letter-spacing: -0.01em;
      transition: border-color .3s;
    }
    .btn-outline:hover { border-color: var(--textprimary); }
    .hero-proof{
  margin-top:40px;
  margin-bottom: 8px;
  font-size:12px;
  letter-spacing:.04em;
  color:var(--textmuted);
  text-align: left;
}
        /* Fine line vectors */
    .hero-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .line-vert,
    .line-horiz {
      position: absolute;
      background: var(--accent);
      opacity: 0.12;
    }
    .line-vert {
      width: 1px;
      height: 40%;
      left: 12%;
      top: 30%;
    }
    .line-vert:nth-child(2) {
      left: auto;
      right: 12%;
      top: 20%;
      height: 30%;
    }
    .line-horiz {
      height: 1px;
      width: 30%;
      bottom: 20%;
      left: 10%;
    }
    .line-horiz:nth-child(4) {
      bottom: 35%;
      right: 8%;
      left: auto;
      width: 20%;
    }
    @media (max-width: 900px) {
      .line-vert, .line-horiz { display: none; }
    }
    /* Scroll indicator */
    .scroll-hint {
      position: absolute; bottom: 40px;
      left: clamp(24px, 4vw, 64px);
      display: flex; align-items: center; gap: 12px;
      z-index: 1;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: var(--bordergray);
      overflow: visible; position: relative;
    }
    .scroll-line-inner {
      position: absolute; width: 100%;
      background: var(--textmuted);
      animation: scrollAnim 2.5s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes scrollAnim {
      0%   { transform: scaleY(0) translateY(0); transform-origin: top; }
      50%  { transform: scaleY(1) translateY(0); transform-origin: top; }
      100% { transform: scaleY(0) translateY(100%); transform-origin: bottom; }
    }
    .scroll-hint span {
      font-size: 11px; letter-spacing: .06em;
      text-transform: uppercase; color: var(--textmuted);
      font-weight: 500;
    }
    @media (max-width: 480px) { .scroll-hint { display: none; } }

    /* ══════════════════════════
       TICKER
    ══════════════════════════ */
  
    /* ══════════════════════════
       SELECTED WORK
    ══════════════════════════ */
    .work-section{
    padding: clamp(70px,10vw,140px) 0;
    }
    .work-section .section-inner {
      padding: 0 clamp(24px, 4vw, 64px);
    }
    .section-inner { max-width: 1440px; margin: 0 auto; }
    .section-header {
      display: flex; justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--bordergray);
      padding-bottom: 24px;
      margin-bottom: clamp(48px, 8vw, 80px);
    }
    .section-eyebrow {
      font-size: 12px; font-weight: 500;
      color: var(--textmuted);
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: clamp(22px, 2.5vw, 28px);
      font-weight: 500; letter-spacing: -0.03em;
      color: var(--textprimary);
    }
    .section-count {
      font-size: 13px; color: var(--textmuted);
    }
    .section-manifesto {
  font-size: 12px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
  font-weight: 600;
}
    @media (max-width: 480px) { .section-count { display: none; } }

    /* Work grid */
    .work-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(32px, 5vw, 48px) clamp(20px, 3vw, 48px);
    }
    @media (max-width: 640px) {
      .work-grid { grid-template-columns: 1fr; }
    }
    .work-card { cursor: pointer; }
    .work-img-wrap {
      aspect-ratio: 4/3;
      overflow: visible; background: var(--warmgray);
      margin-bottom: 20px; position: relative;
    }
    .work-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .7s cubic-bezier(.25,.1,.25,1);
    }
    .work-card:hover .work-img-wrap img { transform: scale(1.04); }
    .work-card-info {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 16px;
    }
    .work-card-name {
      font-size: clamp(16px, 1.5vw, 18px);
      font-weight: 500; letter-spacing: -0.02em;
      color: var(--textprimary); margin-bottom: 4px;
    }
    .work-card-cat {
      font-size: 13px; color: var(--textmuted);
    }
    .work-card-stmt {
      font-size: 13px; color: var(--textsecondary);
      font-style: normal;
      font-weight: 500;
    }
    @media (max-width: 640px) { .work-card-stmt { display: none; } }

    /* Work: scroll strip for videos */
    .work-strip-label {
      font-size: 11px; font-weight: 500;
      color: var(--textmuted); letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: 14px;
      margin-top: 56px;
      padding: 0 clamp(24px, 4vw, 64px);
    }
    .scroll-strip {
      display: flex; gap: 12px; overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 12px;
      padding-left: clamp(24px, 4vw, 64px);
      padding-right: clamp(24px, 4vw, 64px);
      cursor: grab;
    }
    .scroll-strip::after {
      content: '';
      flex: 0 0 clamp(24px, 4vw, 64px);
      margin-left: calc(-1 * clamp(24px, 4vw, 64px));
    }
    .scroll-strip:active { cursor: grabbing; }
    .scroll-strip::-webkit-scrollbar { height: 2px; }
    .scroll-strip::-webkit-scrollbar-track { background: var(--bordergray); border-radius: 99px; }
    .scroll-strip::-webkit-scrollbar-thumb { background: var(--textmuted); border-radius: 99px; }
.film-card {

.film-card iframe {

}
.reel-poster > div:last-child svg {
  margin-left: 3px;

  align-items: center;
  justify-content: center;

.reel-poster > div:first-child {
  position: absolute;

  pointer-events: none;
}

    }
    .work-attr {
      margin-top: 24px;

    }
    .work-attr a { color: var(--accent); border-bottom: 1px solid var(--accentmuted); }
 @media (max-width: 768px) {

    /* ══════════════════════════
       Engagements
    ══════════════════════════ */
    .engagements-section {
      background: var(--warmgray);

  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        nav.classList.toggle('scrolled', window.scrollY > 60);
        if (!ctaDismissed && persistCta && window.scrollY > 600) {

  var mobToggle = document.getElementById('mob-toggle');
  var mobMenu   = document.getElementById('mob-menu');

    menuOpen = !menuOpen;
    mobToggle.classList.toggle('open', menuOpen);
    mobToggle.setAttribute('aria-expanded', String(menuOpen));
    mobToggle.setAttribute('aria-label', menuOpen ? 'Close navigation menu' : 'Open navigation menu');
    mobMenu.classList.toggle('open', menuOpen);
    mobMenu.setAttribute('aria-visible', String(!menuOpen));
    if (menuOpen) { mobMenu.removeAttribute('inert'); } else { mobMenu.setAttribute('inert', ''); }
    document.body.style.overflow = menuOpen ? 'visible' : '';
  });
  window.closeMob = function() {
    menuOpen = false;
    mobToggle.classList.remove('open');
    mobToggle.setAttribute('aria-expanded', 'false');
    mobMenu.classList.remove('open');

    mobMenu.setAttribute('inert', '');

      closeMob();

  });

  var revealObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.fade-up').forEach(function(el) { revealObs.observe(el); });

      entries.forEach(function(e) {
        if (e.isIntersecting) { divider.classList.add('visible'); divObs.unobserve(e.target); }

      persistCta.style.transform = 'translateY(100%)';

}

  function addDrag(el) {
    if (!el) return;
    var isDown = false, startX, scrollLeft;
    el.addEventListener('mousedown', function(e) {
      isDown = true; el.style.cursor = 'grabbing';
      startX = e.pageX - el.getBoundingClientRect().left; scrollLeft = el.scrollLeft;
    });
    document.addEventListener('mouseup', function() { isDown = false; el.style.cursor = 'grab'; });
    el.addEventListener('mousemove', function(e) {
      if (!isDown) return; e.preventDefault();
      var x = e.pageX - el.getBoundingClientRect().left;
      el.scrollLeft = scrollLeft - (x - startX);
    });
  }
  addDrag(document.getElementById('films-strip'));
  addDrag(document.getElementById('reels-strip'));

  var navAnchors = document.querySelectorAll('.nav-links a[href^="#"]');
  var sections = [];
  navAnchors.forEach(function(a) {
    var id = a.getAttribute('href').replace('#', '');
    var sec = document.getElementById(id);
    if (sec) sections.push({ el: sec, link: a, top: 0 });
  });
  function recalcTops() {
    sections.forEach(function(s) { s.top = s.el.getBoundingClientRect().top + window.scrollY; });
  }
  recalcTops();
  window.addEventListener('resize', recalcTops, { passive: true });
 function setActiveNav() {
    var scrollY = window.scrollY + 120;
    var current = null;
    sections.forEach(function(s) {
      if (s.top <= scrollY) current = s;
    });
    sections.forEach(function(s) {
      s.link.classList.toggle('active', s === current);
    });
  }

<script>
(function () {
  'use strict';

  var SUPABASE_TABLE = 'leads';
  var form      = document.getElementById('contact-form');
  var submitBtn = document.getElementById('form-submit-btn');
  if (!form || !submitBtn) return;

  var submitted = false;

  function setState(state, message) {
    switch (state) {
      case 'loading':
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>';
        submitBtn.style.background = '';
        break;
      case 'success':
        submitBtn.disabled = true;
        submitBtn.innerHTML = message || '✓ Brief received, we\u2019ll respond within 48 hours.';
        submitBtn.style.background = '#1fad4e';
        break;
      case 'error':
        submitBtn.disabled = false;
        submitBtn.innerHTML = message || 'Something went wrong, please try again.';
        submitBtn.style.background = '#EF4444';
        submitted = false;
        var formNext = document.querySelector('.form-next');
        if (formNext) {
          formNext.innerHTML = 'Having trouble? <a href="https://wa.me/918588897488?text=Hi%20SQUARGRAPH%2C%20I%20want%20to%20discuss%20a%20project" target="_blank" rel="noopener noreferrer" style="color:var(--accent);border-bottom:1px solid var(--accentmuted);">Send us a WhatsApp instead →</a>';
        }
        setTimeout(function () {
          submitBtn.innerHTML = originalLabel;
          submitBtn.style.background = '';
        }, 5000);
        break;
      default:
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalLabel;
        submitBtn.style.background = '';

  var CITY_DATA = {

    'Australia': ['Brisbane','Melbourne','Perth','Sydney','Other'],
    'Canada': ['Calgary','Montreal','Toronto','Vancouver','Other'],
    'Germany': ['Berlin','Frankfurt','Hamburg','Munich','Other'],
    'France': ['Lyon','Marseille','Paris','Other'],
    'Japan': ['Osaka','Tokyo','Other']
  };

  function initCountryCityMapping(countryId, cityId) {
    var countryEl = document.getElementById(countryId);
    var cityEl    = document.getElementById(cityId);
    var textEl    = document.getElementById(cityId + '-text');
    if (!countryEl || !cityEl) return;

    countryEl.addEventListener('change', function() {
      var country = this.value;
      var cities  = CITY_DATA[country] || [];
      cityEl.innerHTML = '';

      if (!country || cities.length === 0) {
        cityEl.style.display = 'none';
        if (textEl) { textEl.style.display = 'block'; textEl.value = ''; }
        return;
      }

      var ph = document.createElement('option');
      ph.value = ''; ph.disabled = true; ph.selected = true;
      ph.textContent = 'Select city';
      cityEl.appendChild(ph);

      cities.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c; o.textContent = c;
        cityEl.appendChild(o);
      });

      cityEl.style.display = 'block';
      if (textEl) { textEl.style.display = 'none'; textEl.value = ''; }
    });

    cityEl.addEventListener('change', function() {
      if (!textEl) return;
      if (this.value === 'Other') {
        textEl.style.display = 'block'; textEl.focus();
      } else {
        textEl.style.display = 'none'; textEl.value = '';
      }
    });
  }

  function initRobustITI(inputId) {
    return new Promise(function(resolve, reject) {
      var input = document.getElementById(inputId);
      if (!input) return reject(new Error('Input not found: ' + inputId));

      function tryInit() {
        if (typeof window.intlTelInput !== 'function') {
          return reject(new Error('intlTelInput not loaded'));
        }
        try {
          var instance = window.intlTelInput(input, {
            initialCountry: 'in',
            separateDialCode: true,
            preferredCountries: ['in', 'ae', 'us', 'gb', 'sg'],
            utilsScript: 'https://cdn.jsdelivr.net/npm/intl-tel-input@18/build/js/utils.js'
          });
          resolve(instance);
        } catch(e) { reject(e); }
      }

      if (typeof window.intlTelInput === 'function') {
        tryInit();
      } else {
        var waited = 0;
        var poll = setInterval(function() {
          waited += 50;
          if (typeof window.intlTelInput === 'function') {
            clearInterval(poll); tryInit();
          } else if (waited > 5000) {
            clearInterval(poll); reject(new Error('intlTelInput timeout'));
          }
        }, 50);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    initCountryCityMapping('country-location', 'city');
    initRobustITI('phone').then(function(instance) {
      window.iti = instance;
    }).catch(function(e) { console.error('ITI Init failed', e); });
  });
  function getPayload(formEl) {
    var raw = Object.fromEntries(new FormData(formEl).entries());
    return {
      name:       raw.name      || null,
      phone: (window.iti ? window.iti.getNumber() : raw.phone) || null,
      email:      raw.email     || null,
      company:    raw.company   || null,
      service:    raw.service   || null,
      budget:     raw.budget    || null,
      timeline:   raw.timeline  || null,
      message:    raw.message   || null,
      reference:  raw.reference || null,
      created_at: new Date().toISOString(),
      source_url: window.location.href,
country: raw.country || null,
city: raw.city || raw.city_text || null,
industry: (document.getElementById('industry-contact') ? document.getElementById('industry-contact').value : null) || null
    };
  }

  function validateForm(formEl) {
    var required = formEl.querySelectorAll('[required]');
    var valid = true;
    required.forEach(function(field) {
      var errContainer = field.closest('form > div') || field.parentNode;
      var err = errContainer.querySelector('.field-error');

      // Special handling for phone field
      if (field.id === 'phone' && typeof iti !== 'undefined') {
        if (!field.value.trim()) {
          field.classList.add('error');
          if (err) { err.textContent = 'Please enter your phone number.'; err.classList.add('visible'); }
          if (valid) field.focus();
          valid = false;
        } else if (!iti.isValidNumber()) {
          field.classList.add('error');
          if (err) { err.textContent = 'Please enter a valid ' + iti.getSelectedCountryData().name + ' phone number.'; err.classList.add('visible'); }
          if (valid) field.focus();
          valid = false;
        } else {
          field.classList.remove('error');
          if (err) err.classList.remove('visible');
        }
        return;
      }

      if (!field.value.trim()) {
        field.classList.add('error');
        if (err) err.classList.add('visible');
        if (valid) field.focus();
        valid = false;
      } else {
        field.classList.remove('error');
        if (err) err.classList.remove('visible');
      }
    });
    return valid;
  }
document.querySelectorAll('#contact-form .form-input').forEach(function(field) {
    field.addEventListener('input', function() {
      field.classList.remove('error');
      var err = field.parentNode.querySelector('.field-error');
      if (err) err.classList.remove('visible');
    });
  });
  async function submitLead(payload) {
  if (!window.__sb) {
    await new Promise(function(resolve, reject) {
      var waited = 0;
      var check = setInterval(function() {
        waited += 100;
        if (window.__sb) { clearInterval(check); resolve(); }
        if (waited >= 5000) { clearInterval(check); reject(new Error('Supabase timeout')); }
      }, 100);
    });
  }

  const { error } = await window.__sb
    .from(SUPABASE_TABLE)
    .insert([payload]);

  if (error) throw new Error('Insert failed');

  return true;
}
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    if (submitted) return;
if (!validateForm(form)) { setState('error', 'Please fill in all required fields.'); return; }
var captchaVal = typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : '';
if (!captchaVal) {
  document.getElementById('captcha-error').style.display = 'block';
  return;
}
document.getElementById('captcha-error').style.display = 'none';
submitted = true;
    setState('loading');

      setState('success');
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: 'form_submission_success' });

    } catch (err) {
      console.error('[SQUARGRAPH] Form error:', err.message);
      setState('error', 'Submission failed, please try WhatsApp or email directly.');
    }
  });

})();
